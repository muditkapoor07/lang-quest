services:
  - type: web
    name: lang-quest
    runtime: node
    buildCommand: npm install && npm install --prefix server && npm install --prefix client --include=dev && npm run build --prefix client
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
